<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 塔罗牌 - 多牌阵手势占卜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow-x: hidden;
        }
        
        .tarot-font {
            font-family: 'Cinzel', serif;
        }
        
        .mystical-glow {
            box-shadow: 0 0 30px rgba(233, 196, 106, 0.3), 
                        inset 0 0 30px rgba(233, 196, 106, 0.1);
        }
        
        .card-back {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            border: 2px solid #e9c46a;
            position: relative;
            overflow: hidden;
        }
        
        .card-back::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 30%, rgba(233,196,106,0.2) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(233,196,106,0.1) 0%, transparent 50%);
        }
        
        .card-back::after {
            content: '☆';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            color: #e9c46a;
            opacity: 0.8;
            text-shadow: 0 0 20px rgba(233,196,106,0.8);
        }
        
        .card-face {
            background: linear-gradient(135deg, #faf8f3 0%, #f0ebe3 100%);
            border: 3px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .shuffling {
            animation: shuffle 0.5s ease-in-out infinite;
        }
        
        @keyframes shuffle {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-15px) rotate(-8deg) scale(1.05); }
            75% { transform: translateY(-15px) rotate(8deg) scale(1.05); }
        }
        
        .drawing {
            animation: draw 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        @keyframes draw {
            0% { transform: scale(0.5) translateY(-100px) rotateY(180deg); opacity: 0; }
            50% { transform: scale(1.1) translateY(-20px) rotateY(90deg); }
            100% { transform: scale(1) translateY(0) rotateY(0deg); opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card-slot {
            transition: all 0.3s ease;
        }
        
        .card-slot:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(233,196,106,0.2);
        }
        
        .card-slot.occupied {
            border-color: #e9c46a;
            background: rgba(233,196,106,0.05);
        }
        
        .spread-selector {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233,196,106,0.2);
        }
        
        .spread-btn {
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .spread-btn:hover {
            border-color: rgba(233,196,106,0.5);
            background: rgba(233,196,106,0.1);
            transform: translateX(5px);
        }
        
        .spread-btn.active {
            background: linear-gradient(90deg, rgba(233,196,106,0.3), rgba(233,196,106,0.1));
            border-color: #e9c46a;
            box-shadow: 0 0 15px rgba(233,196,106,0.3);
        }
        
        .star-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.9), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.9), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.7), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.4;
            animation: twinkle 8s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        #webcam {
            transform: scaleX(-1);
            opacity: 0.9;
            border-radius: 12px;
        }
        
        .status-pill {
            background: linear-gradient(90deg, rgba(233,196,106,0.2), rgba(233,196,106,0.05));
            border: 1px solid rgba(233,196,106,0.4);
        }
        
        .position-label {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            border: 1px solid rgba(233,196,106,0.3);
            backdrop-filter: blur(4px);
        }
        
        /* 凯尔特十字特殊布局 */
        .celtic-cross-layout {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            aspect-ratio: 1;
        }
        
        .celtic-pos-1 { grid-column: 2; grid-row: 2; } /* 中心 */
        .celtic-pos-2 { grid-column: 2; grid-row: 2; transform: rotate(90deg) translateX(20px); z-index: 1; } /* 横置 */
        .celtic-pos-3 { grid-column: 2; grid-row: 1; } /* 上方 */
        .celtic-pos-4 { grid-column: 3; grid-row: 2; } /* 右方 */
        .celtic-pos-5 { grid-column: 2; grid-row: 3; } /* 下方 */
        .celtic-pos-6 { grid-column: 1; grid-row: 2; } /* 左方 */
        .celtic-pos-7 { grid-column: 4; grid-row: 4; } /* 基础 */
        .celtic-pos-8 { grid-column: 4; grid-row: 3; } /* 过去 */
        .celtic-pos-9 { grid-column: 4; grid-row: 2; } /* 未来 */
        .celtic-pos-10 { grid-column: 4; grid-row: 1; } /* 结果 */
        
        .horseshoe-layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .horseshoe-layout .card-wrapper:nth-child(1) { transform: rotate(-15deg) translateY(20px); }
        .horseshoe-layout .card-wrapper:nth-child(2) { transform: rotate(-10deg) translateY(10px); }
        .horseshoe-layout .card-wrapper:nth-child(3) { transform: rotate(-5deg) translateY(5px); }
        .hothic-layout .card-wrapper:nth-child(4) { transform: rotate(0deg); }
        .horseshoe-layout .card-wrapper:nth-child(5) { transform: rotate(5deg) translateY(5px); }
        .horseshoe-layout .card-wrapper:nth-child(6) { transform: rotate(10deg) translateY(10px); }
        .horseshoe-layout .card-wrapper:nth-child(7) { transform: rotate(15deg) translateY(20px); }
        
        .pyramid-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .pyramid-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen text-gray-100 relative">
    <div class="star-bg"></div>
    
    <!-- 头部 -->
    <header class="relative z-10 text-center py-6">
        <h1 class="tarot-font text-4xl md:text-5xl text-yellow-400 mb-2 tracking-wider mystical-glow p-4 rounded-lg inline-block bg-black/20">

                    </div>

                <!-- 操作说明 -->
                <div id="instruction" class="gesture-hint bg-black/40 backdrop-blur-md px-4 py-3 rounded-lg text-center text-sm border border-yellow-600/30">
                    请允许摄像头权限，准备开始占卜

            </div>

            <!-- 右侧：塔罗牌桌 (8列) -->
            <div class="xl:col-span-8 space-y-4">
                
                <!-- 牌桌区域 -->
                <div class="bg-gradient-to-br from-purple-900/20 via-blue-900/20 to-indigo-900/20 rounded-2xl p-6 mystical-glow min-h-[500px] relative border border-white/5">

                    <div class="absolute top-6 right-6 z-20">

                            <div class="absolute inset-0 card-back rounded-lg shadow-2xl flex items-center justify-center bg-gradient-to-br from-purple-900 to-indigo-900">

    </main>

        function createCardSlot(index) {
            const pos = currentSpread.positions[index];
            const slot = document.createElement('div');
            slot.id = `slot-${index}`;
            slot.className = 'card-slot w-24 h-36 rounded-lg border-2 border-dashed border-yellow-600/30 bg-black/20 flex flex-col items-center justify-center relative cursor-pointer hover:border-yellow-600/60 transition-all';
            slot.innerHTML = `
                <div class="text-center pointer-events-none">

                    <div class="text-[10px] text-yellow-600/60 px-1 text-center leading-tight">${pos.name}</div>

            slot.onmouseenter = () => slot.querySelector('.position-label').style.opacity = '1';
            slot.onmouseleave = () => slot.querySelector('.position-label').style.opacity = '0';

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, facingMode: 'user' },
                audio: false
            });
            video.srcObject = stream;
            return new Promise((resolve) => {
                video.onloadedmetadata = () => resolve(video);
            });
        }

        async function detectHands() {
            if (!model || video.readyState !== 4) {
                requestAnimationFrame(detectHands);
                return;
            }

            const predictions = await model.estimateHands(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (predictions.length > 0) {
                const hand = predictions[0];
                const landmarks = hand.landmarks;
                
                drawHand(landmarks);
                
                const gesture = recognizeGesture(landmarks);
                handleGesture(gesture);
                
                updateDebugInfo(gesture);
            } else {
                document.getElementById('gestureStatus').classList.add('hidden');
                isTwoFingerGesture = false;
            }

            requestAnimationFrame(detectHands);
        }

        function drawHand(landmarks) {
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.fillStyle = '#00ff88';
            
            landmarks.forEach((point, index) => {
                ctx.beginPath();
                ctx.arc(point[0], point[1], 3, 0, 2 * Math.PI);
                ctx.fill();
            });
            
            const fingers = [
                [0, 1, 2, 3, 4],
                [0, 5, 6, 7, 8],
                [0, 9, 10, 11, 12],
                [0, 13, 14, 15, 16],
                [0, 17, 18, 19, 20]
            ];
            
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.4)';
            fingers.forEach(finger => {
                ctx.beginPath();
                ctx.moveTo(landmarks[finger[0]][0], landmarks[finger[0]][1]);
                for (let i = 1; i < finger.length; i++) {
                    ctx.lineTo(landmarks[finger[i]][0], landmarks[finger[i]][1]);
                }
                ctx.stroke();
            });
        }

        function recognizeGesture(landmarks) {
            const now = Date.now();
            const palm = landmarks[9];
            
            // 记录历史
            handHistory.push({ x: palm[0], y: palm[1], time: now });
            if (handHistory.length > 15) handHistory.shift();
            
            // 检测双指手势（切换牌阵）
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const wrist = landmarks[0];
            const indexPip = landmarks[6];
            const middlePip = landmarks[10];
            
            // 检查食指和中指是否伸展，其他手指弯曲
            const indexExtended = indexTip[1] < indexPip[1];
            const middleExtended = middleTip[1] < middlePip[1];
            const ringCurled = landmarks[16][1] > landmarks[14][1];
            const pinkyCurled = landmarks[20][1] > landmarks[18][1];
            
            if (indexExtended && middleExtended && ringCurled && pinkyCurled) {
                if (!isTwoFingerGesture && now - lastGestureTime > 3000) {
                    isTwoFingerGesture = true;
                    return 'switch';
                }
            } else {
                isTwoFingerGesture = false;
            }
            
            // 检测洗牌（水平移动）
            let horizontalMove = 0;
            if (handHistory.length >= 8) {
                const recent = handHistory.slice(-8);
                const xDiff = recent[recent.length - 1].x - recent[0].x;
                horizontalMove = Math.abs(xDiff);
            }
            
            if (horizontalMove > 100 && !isShuffling && now - lastGestureTime > gestureCooldown) {
                return 'shuffle';
            }
            
            // 检测抽牌（手掌张开前推）
            const fingersExtended = [8, 12, 16, 20].filter(tip => {
                return landmarks[tip][1] < landmarks[tip - 2][1]; // 指尖比关节高
            }).length;
            
            if (fingersExtended >= 3 && !isShuffling && now - lastGestureTime > gestureCooldown * 0.8) {
                // 检测是否有向前推的动作（z轴变化或y轴上移）
                const yTrend = handHistory.length > 5 ? handHistory[handHistory.length - 1].y - handHistory[0].y : 0;
                if (yTrend < -30) return 'draw';
            }
            
            return 'none';
        }

        function handleGesture(gesture) {
            const now = Date.now();
            
            if (gesture === 'switch') {
                lastGestureTime = now;
                const currentIndex = spreads.indexOf(currentSpread);
                const nextIndex = (currentIndex + 1) % spreads.length;
                selectSpread(nextIndex);
                updateInstruction(`已切换至${spreads[nextIndex].name}`, 'text-blue-300');
                createParticles();
            }
            else if (gesture === 'shuffle') {
                lastGestureTime = now;
                performShuffle();
            }
            else if (gesture === 'draw') {
                lastGestureTime = now;
                performDraw();
            }
            
            const statusEl = document.getElementById('gestureStatus');
            statusEl.classList.remove('hidden');
            const gestureText = {
                'switch': '✌️ 切换牌阵',
                'shuffle': '👋 洗牌中',
                'draw': '✋ 抽牌',
                'none': '等待手势...'
            };
            const gestureColor = {
                'switch': 'text-blue-400',
                'shuffle': 'text-yellow-400',
                'draw': 'text-green-400',
                'none': 'text-gray-400'
            };
            statusEl.innerHTML = `<span class="${gestureColor[gesture] || ''}">${gestureText[gesture]}</span>`;
        }

        function performShuffle() {
            if (isShuffling) return;
            
            isShuffling = true;
            updateInstruction('正在洗牌...保持挥手', 'text-yellow-300');
            
            const deckEl = document.getElementById('deck');
            deckEl.classList.add('shuffling');
            
            // 随机打乱
            deck = [...tarotDeck.major].sort(() => Math.random() - 0.5);
            
            setTimeout(() => {
                deckEl.classList.remove('shuffling');
                isShuffling = false;
                createParticles();
                updateInstruction(`洗牌完成！请手掌前推抽取${currentSpread.cardCount}张牌`, 'text-green-300');
            }, 2500);
        }

        function performDraw() {
            if (drawnCards.length >= currentSpread.cardCount || isShuffling) {
                if (drawnCards.length >= currentSpread.cardCount) {
                    updateInstruction('牌阵已完成，查看下方解读', 'text-purple-300');
                }
                return;
            }
            
            if (deck.length === 0) deck = [...tarotDeck.major].sort(() => Math.random() - 0.5);
            
            const card = deck.pop();
            const position = drawnCards.length;
            drawnCards.push({ ...card, position });
            
            revealCard(card, position);
            
            const remaining = currentSpread.cardCount - drawnCards.length;
            updateInstruction(`已抽取第${position + 1}张，还剩${remaining}张`, 'text-blue-300');
            
            if (drawnCards.length === currentSpread.cardCount) {
                setTimeout(() => {
                    showInterpretation();
                    document.getElementById('resetBtn').classList.remove('hidden');
                }, 800);
            }
        }

        function revealCard(card, position) {
            const slot = document.getElementById(`slot-${position}`);
            const pos = currentSpread.positions[position];
            
            slot.classList.add('occupied');
            slot.innerHTML = '';
            slot.style.border = '2px solid #e9c46a';
            slot.style.background = 'linear-gradient(135deg, rgba(233,196,106,0.1), rgba(233,196,106,0.05))';
            
            const cardEl = document.createElement('div');
            cardEl.className = 'w-full h-full rounded-lg card-face flex flex-col items-center justify-center p-2 drawing relative overflow-hidden';
            
            // 随机正逆位
            const isReversed = Math.random() > 0.7; // 30%概率逆位
            const rotateDeg = isReversed ? 180 : 0;
            
            cardEl.innerHTML = `
                <div class="absolute inset-0 bg-gradient-to-br from-amber-50 to-orange-50 opacity-50"></div>
                <div class="relative z-10 text-center transform ${isReversed ? 'rotate-180' : ''}" style="transition: transform 0.5s;">
                    <div class="text-3xl mb-1 filter drop-shadow-lg">${getCardSymbol(card.name)}</div>
                    <div class="font-bold text-gray-800 text-xs leading-tight mb-0.5">${card.name}</div>
                    <div class="text-[9px] text-gray-500 tarot-font uppercase tracking-wider">${card.nameEn}</div>
                    ${isReversed ? '<div class="text-[8px] text-red-500 mt-1 font-bold">逆位</div>' : '<div class="text-[8px] text-blue-600 mt-1">正位</div>'}
                </div>
                <div class="absolute top-1 left-1 text-[8px] text-gray-400 font-bold">${position + 1}</div>
                <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/10 to-transparent h-8"></div>
            `;
            
            slot.appendChild(cardEl);
            
            // 光效
            setTimeout(() => {
                cardEl.style.boxShadow = '0 0 20px rgba(233, 196, 106, 0.4), inset 0 0 20px rgba(255,255,255,0.2)';
            }, 600);
        }

        function getCardSymbol(name) {
            const symbols = {
                '愚者': '🃏', '魔术师': '🎩', '女祭司': '🌙', '皇后': '👑', '皇帝': '⚔️',
                '教皇': '📿', '恋人': '💕', '战车': '🏛️', '力量': '🦁', '隐士': '🏔️',
                '命运之轮': '☸️', '正义': '⚖️', '倒吊人': '🙃', '死神': '💀', '节制': '🏺',
                '恶魔': '⛓️', '塔': '🗼', '星星': '⭐', '月亮': '🌕', '太阳': '☀️',
                '审判': '🎺', '世界': '🌍'

            return symbols[name] || '🔮';

        function showInterpretation() {
            const interp = document.getElementById('interpretation');
            const text = document.getElementById('readingText');
            
            let html = `<div class="mb-4 text-yellow-200/80 text-sm italic">${currentSpread.interpretation}</div>`;
            
            // 分析牌面组合
            const elements = {};
            const upright = [];
            const reversed = [];
            
            drawnCards.forEach((card, i) => {
                const pos = currentSpread.positions[i];
                const isReversed = card.position % 3 === 2; // 简化判断
                
                html += `
                    <div class="flex gap-3 items-start p-3 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                        <div class="flex-shrink-0 w-8 h-12 rounded bg-gradient-to-br from-yellow-100 to-yellow-200 flex items-center justify-center text-lg shadow-lg">
                            ${getCardSymbol(card.name)}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="font-bold text-yellow-400 text-sm">${pos.name}</span>
                                <span class="text-xs text-gray-500">· ${card.name}</span>
                                ${isReversed ? '<span class="text-[10px] bg-red-900/50 text-red-300 px-1.5 rounded">逆位</span>' : '<span class="text-[10px] bg-blue-900/50 text-blue-300 px-1.5 rounded">正位</span>'}
                            </div>
                            <p class="text-xs text-gray-400 leading-relaxed">${pos.meaning}：${isReversed ? '需要警惕' : ''}${card.meaning}</p>
                            <div class="flex gap-1 mt-1">
                                ${card.keywords.map(k => `<span class="text-[10px] bg-purple-900/30 text-purple-300 px-1.5 rounded">${k}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
                
                // 统计
                elements[card.element] = (elements[card.element] || 0) + 1;
                if (isReversed) reversed.push(card.name);
                else upright.push(card.name);
            });
            
            // 添加综合分析
            const dominantElement = Object.entries(elements).sort((a,b) => b[1]-a[1])[0];
            html += `
                <div class="mt-4 p-4 bg-gradient-to-r from-purple-900/40 to-blue-900/40 rounded-lg border border-purple-500/30">
                    <h4 class="font-bold text-purple-300 mb-2 text-sm">🔮 综合能量分析</h4>
                    <p class="text-xs text-gray-300 leading-relaxed mb-2">
                        主导元素：<span class="text-yellow-400">${dominantElement ? dominantElement[0] : '平衡'}</span> 
                        (${dominantElement ? Math.round(dominantElement[1]/drawnCards.length*100) : 0}%)
                    </p>
                    <p class="text-xs text-gray-400 leading-relaxed">
                        ${reversed.length > 0 ? `逆位提示：${reversed.join('、')}显示需要内在调整或延迟。` : '全是正位，能量流通顺畅。'}
                        建议关注${dominantElement ? dominantElement[0] : '各'}元素能量的${dominantElement && dominantElement[1] > drawnCards.length/2 ? '过度集中或缺乏' : '平衡'}。
                    </p>
                </div>
            `;
            
            text.innerHTML = html;
            interp.classList.remove('hidden');
            interp.scrollIntoView({ behavior: 'smooth' });
        }

        function resetReading() {
            drawnCards = [];
            deck = [...tarotDeck.major].sort(() => Math.random() - 0.5);
            isShuffling = false;
            
            renderSpread();
            
            document.getElementById('interpretation').classList.add('hidden');
            document.getElementById('resetBtn').classList.add('hidden');
            
            updateInstruction('请洗牌开始新的占卜', 'text-gray-300');
        }

        function resetUI() {
            document.getElementById('interpretation').classList.add('hidden');
            document.getElementById('resetBtn').classList.add('hidden');
        }

        function autoDraw() {
            // 自动补全剩余牌位（调试用）
            while (drawnCards.length < currentSpread.cardCount) {
                performDraw();
            }
        }

        function createParticles() {
            const colors = ['#e9c46a', '#f4a261', '#e76f51', '#2a9d8f', '#9b5de5'];
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.style.cssText = `
                    position: fixed;
                    width: ${4 + Math.random() * 6}px;
                    height: ${4 + Math.random() * 6}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 100;
                    left: 50%;
                    top: 50%;
                    box-shadow: 0 0 10px currentColor;
                `;
                document.body.appendChild(p);
                
                const angle = (Math.PI * 2 * i) / 30 + Math.random();
                const velocity = 100 + Math.random() * 150;
                
                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*velocity}px, ${Math.sin(angle)*velocity}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1200 + Math.random() * 800,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => p.remove();
            }
        }

        function updateStatus(id, text, color) {
            const el = document.getElementById(id);
            const colors = { yellow: 'bg-yellow-400', green: 'bg-green-400', red: 'bg-red-400', blue: 'bg-blue-400' };
            el.innerHTML = `<span class="w-2 h-2 ${colors[color] || 'bg-gray-400'} rounded-full ${color === 'yellow' ? 'animate-pulse' : ''}"></span>${text}`;
        }

        function updateInstruction(text, colorClass) {
            const el = document.getElementById('instruction');
            el.className = `gesture-hint bg-black/40 backdrop-blur-md px-4 py-3 rounded-lg text-center text-sm border border-yellow-600/30 ${colorClass}`;
            el.innerHTML = text;
        }

        function updateDebugInfo(gesture) {
            // 简化调试
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
